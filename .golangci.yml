      gidhandlershape:
        type: module
        description: 'GID-230: a handler has Handle(ctx, ...) (..., error) and <Handler>Validator/<Handler>Service deps; the gRPC service struct exposes exported *Handler fields'
        original-url: github.com/slipros/gid-data-golang-eval
