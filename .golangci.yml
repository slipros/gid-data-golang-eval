        original-url: github.com/slipros/gid-data-golang-eval
        # Exclusions ("Method" | "Type.Method"):
        # settings:
        #   exclude:
        #     - 'Repo.excludedMethod'
      gidscanrow:
        type: module
        description: 'GID-245: an epgx Select into a one-field struct reads a single column — use ScanRow with the column pointer directly'
        original-url: github.com/slipros/gid-data-golang-eval
        # Exclusions ("Method" | "Type.Method"):
        # settings:
        #   exclude:
        #     - 'Repo.excludedMethod'

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # --- consent-api base ---
      - linters:
          - govet
        text: declaration of "err" shadows declaration
      - linters:
          - err113
        text: do not define dynamic errors, use wrapped static errors instead
      - linters:
          - gocritic
        text: 'commentedOutCode: may want to remove commented-out code'
      - path: (.+)\.go$
        text: ST1000
      # --- specifics of this repository ---
      # AST analyzers compare identifier names and signature arities —
      # string and numeric literals are legitimate here
      - path: analyzers/
        linters:
          - goconst
          - mnd
    paths:
      - \.pb\.go$
      - \.pb\.gw\.go$
      - consumer/http/docs
      - mock*
      - third_party$
      - builtin$
      - examples$
      # eval fixtures violate the rules on purpose (specific to this repository)
      - testdata

formatters:
  enable:
    - goimports # GID-203
  exclusions:
    generated: lax
    paths:
      - \.pb\.go$
      - \.pb\.gw\.go$
      - consumer/http/docs
      - mock*
      - third_party$
      - builtin$
      - examples$
