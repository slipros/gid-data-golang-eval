  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # --- база consent-api ---
      - linters:
          - govet
        text: declaration of "err" shadows declaration
      - linters:
          - err113
        text: do not define dynamic errors, use wrapped static errors instead
      - linters:
          - gocritic
        text: 'commentedOutCode: may want to remove commented-out code'
      - path: (.+)\.go$
        text: ST1000
      # --- специфика этого репозитория ---
      # AST-анализаторы сравнивают имена идентификаторов и арности сигнатур —
      # строковые и числовые литералы здесь законны
      - path: analyzers/
        linters:
          - goconst
          - mnd
    paths:
      - \.pb\.go$
      - \.pb\.gw\.go$
      - consumer/http/docs
      - mock*
      - third_party$
      - builtin$
      - examples$
      # eval-фикстуры намеренно нарушают правила (специфика этого репозитория)
      - testdata

formatters:
  enable:
    - goimports # GID-203
  exclusions:
    generated: lax
    paths:
      - \.pb\.go$
      - \.pb\.gw\.go$
      - consumer/http/docs
      - mock*
      - third_party$
      - builtin$
      - examples$
