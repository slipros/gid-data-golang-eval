      giderrname:
        type: module
        description: 'GID-234: errors in /domain/model are bound to their entity (ErrSnapshotNotFound), generic names (ErrNotFound) are forbidden'
        original-url: github.com/slipros/gid-data-golang-eval
        # The banned generic-name list can be replaced; point exceptions via exclude:
