      gidfsmmap:
        type: module
        description: 'GID-231: an FSM transition map in /domain/model must be unexported'
        original-url: github.com/slipros/gid-data-golang-eval
      gidprotorequired:
        type: module
        description: 'GID-232: NewRequired on a proto3 enum field treats *_UNSPECIFIED=0 as empty — use validator.NewInRange with the allowed values'
        original-url: github.com/slipros/gid-data-golang-eval
        # Exceptions (enum fields exempt from the rule, "Field" or "RequestType.Field"):
