# Эталонный конфиг для custom-gcl. Реестр правил — RULES.md.
# База — боевой конфиг consent-api (UDMP/backend-go); поверх неё накинуты
# слои GID: простые паттерны (слой 1) и собственные gid-анализаторы (слой 2) —
# и настройки стандартных линтеров под стайлгайд (слой 3).
version: "2"

run:
  issues-exit-code: 1
  # База ставила tests: false; включено, иначе тестовые правила
  # (GID-191 gidsubtestname, GID-209) не работают.
  tests: true
  allow-parallel-runners: true
  concurrency: 4
  go: "1.25"
  modules-download-mode: readonly

issues:
  max-issues-per-linter: 50      # Ограничить вывод
  max-same-issues: 3             # Не показывать одну ошибку 100 раз
  new: false                     # false = проверять весь код, true = только изменения
  # одна строка может нарушать несколько правил — показываем все
  uniq-by-line: false

linters:
  # default: standard — errcheck, govet, ineffassign, staticcheck, unused
  # (GID-202/205/206)
  enable:
    # --- база consent-api ---
    - bidichk
    - bodyclose
    - contextcheck
    - copyloopvar
    - durationcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - forcetypeassert
    - goconst
    - gocritic
    - gosec
    - importas       # GID-208: фиксированные алиасы импортов (pb и пр.)
    - ireturn        # GID-208: accept interfaces, return concrete types
    - makezero
    - misspell
    - mnd
    - nakedret       # GID-208: naked return только в коротких функциях
    - nestif         # GID-208: глубина вложенности if
    - nilerr
    - noctx
    - nolintlint
    - prealloc       # GID-208: capacity hint у слайсов
    - predeclared    # GID-208: не шейдить builtin-имена
    - promlinter
    - revive         # GID-207: точечные rules (см. settings)
    - staticcheck    # GID-205/206: SA + S + QF + все ST (checks: all)
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    # --- слой 3, добавлено к базе (GID-208, обоснование — STYLEGUIDE_COVERAGE.md) ---
    - musttag        # GID-208: теги у marshaled-структур
    - perfsprint     # GID-208: strconv vs fmt, конкатенация vs Sprintf
    - depguard       # GID-137: баны библиотек по import-пути (uuid-форки, см. settings)
    # --- Слой 1: простые AST-паттерны (бывший ruleguard) ---
    - gidtimenow       # GID-001
    - giduuidnil       # GID-002
    - giduuidversion   # GID-003
    - gidnewderef      # GID-005
    - gidyoda          # GID-006
    - gidquoteverb     # GID-007
    - giddeepequal     # GID-008
    # --- Слой 2: собственные go/analysis правила ---
    - gidnogetprefix   # GID-101
    - gidnobatch       # GID-102
    - gidonlygofrsuuid # GID-137
    - gidallptr        # GID-004
    - gidflatlayout    # GID-138
    - giddomainerrors  # GID-144
    - giddalerrors     # GID-145
    - gidonlypkgerrors # GID-146
    - gidservicesingle # GID-148
    - gidlayerimports  # GID-132/170/172
    - gidservicemodel  # GID-151
    - gidparamorder    # GID-110/113/153
    - gidoptsstyle     # GID-152
    - gidlogconstruct  # GID-154
    - gidlogctx        # GID-155
    - gidlogchain      # GID-156
    - gidconstvarorder # GID-130
    - gidconstscope    # GID-194
    - gidmodelmethod   # GID-195
    - gidchainperline  # GID-196
    - gidifacemin      # GID-197
    - gidinout         # GID-111
    - gidcreateupdate  # GID-112
    - gidprivatefunc   # GID-133
    - gidentitygroup   # GID-157
    - giddirtree       # GID-158
    - gidcacheplace    # GID-159
    - gidgrpcinservice # GID-160
    - gidnopanic       # GID-161
    - gidhttperrors    # GID-162
    - giddataresponse  # GID-163
    - gidvalidator     # GID-164
    - gidctxkeys       # GID-165/166/167
    - gidreceiver      # GID-103
    - gidctor          # GID-104
    - gidconvnaming    # GID-105/135
    - gidnoptr         # GID-120/121
    - gidsqlnull       # GID-122
    - gidenumstring    # GID-124
    - giddbtags        # GID-125
    - gidenumbased     # GID-123
    - gidmodeltags     # GID-168
    - giderrfile       # GID-169
    - gidfilterplace   # GID-171
    - gidifacenaming   # GID-173
    - gidmetricstruct  # GID-174
    - gidintransaction # GID-175
    - giderrwrap       # GID-176
    - gidstaticerr     # GID-177
    - gidifaceplace    # GID-134
    - gidembedmutex    # GID-178
    - gidchanbuf       # GID-179
    - gidinitclean     # GID-180
    - gidexitonce      # GID-181
    - gidbytesinloop   # GID-182
    - gidmapcap        # GID-183
    - gidfailedto      # GID-184
    - gidnilslice      # GID-185
    - gidfmtconst      # GID-186
    - gidutilpkg       # GID-187
    - gidcustomctx     # GID-188
    - gidchandir       # GID-189
    - giderrlast       # GID-190
    - gidsubtestname   # GID-191
    - gidflagmain      # GID-192
    - gidpkgstutter    # GID-193
    - gidentitymethod  # GID-114
    - gidoptsnaming    # GID-126
    - gidupwardimport  # GID-131
    - giderrnew        # GID-136
    - gidenumconvert   # GID-143
    - gidopstruct      # GID-210
    - gidenumplace     # GID-211
    - gidbuildsig      # GID-212
    - gidvalidatorshape # GID-213
    - gidloggernew     # GID-214
    - gidinlineconv    # GID-215
    - gideventctor     # GID-216
    - gidbansymbol     # GID-217
  disable:
    # Список выключенных — из базы consent-api (осознанный выбор команды).
    # Часть из них покрывала бы GID-правила — помечено комментарием.
    - asasalint
    - asciicheck
    - containedctx    # GID-208: context не хранится в структуре
    - cyclop
    - decorder
    - dogsled
    - exhaustive
    - exhaustruct
    - forbidigo
    - funlen
    - gochecknoglobals
    - gochecknoinits  # GID-208: запрет init()
    - gocognit        # GID-208: когнитивная сложность
    - gocyclo
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - grouper         # GID-208: группировка объявлений
    - interfacebloat  # GID-208: маленькие интерфейсы
    - lll             # GID-201: ширина строки <= 120
    - maintidx
    - nilnil
    - nlreturn
    - nonamedreturns
    - nosprintfhostport
    - paralleltest    # GID-209
    - reassign
    - rowserrcheck
    - sqlclosecheck
    - tagliatelle
    - testpackage     # GID-209: внешние _test-пакеты
    - thelper         # GID-209: t.Helper() в тест-хелперах
    - tparallel       # GID-209: корректность t.Parallel
    - varnamelen
    - wrapcheck
    - wsl

  settings:
    dupl:
      threshold: 100
    errcheck:
      exclude-functions:
        - io/ioutil.ReadFile
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)
        - (io.ReadCloser).Close
        - (*net/http.Response).Body.Close
      check-type-assertions: true # GID-202: comma-ok обязателен
      check-blank: true           # GID-202: запрет _ = err
    goconst:
      min-len: 2
      min-occurrences: 2
    # depguard — только модуленезависимые баны библиотек (полный import-путь).
    # Запреты между слоями здесь не выражаются: deny — префиксный матчинг,
    # потребовал бы хардкода module path в каждом сервисе. Направление
    # слоёв закрывает gidlayerimports (GID-132/170/172/224…229).
    depguard:
      rules:
        uuid:
          files: ["$all"]
          deny:
            - pkg: github.com/google/uuid
              desc: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
            - pkg: github.com/satori/go.uuid
              desc: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
            - pkg: github.com/pborman/uuid
              desc: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
            - pkg: github.com/hashicorp/go-uuid
              desc: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
            - pkg: github.com/twinj/uuid
              desc: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
    staticcheck:
      # GID-206: включаем и стилевые ST-чеки, выключенные по умолчанию
      # (ST1003 initialisms, ST1016 ресивер). ST1000 гасится в exclusions.
      checks: ["all"]
    revive:
      # GID-207: только выбранные правила (см. STYLEGUIDE_COVERAGE.md)
      rules:
        - name: package-comments  # из базы consent-api
          severity: warning
          disabled: true
        - name: exported          # doc-comments у экспортируемых
        - name: indent-error-flow # ошибка обрабатывается в if, без else
        - name: early-return
        - name: superfluous-else
        - name: deep-exit         # os.Exit/log.Fatal вне main запрещены
        - name: dot-imports
        - name: blank-imports     # blank-импорт — с комментарием
        - name: use-any           # any вместо interface{}
    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - generic
    # importas: алиасы фиксируются per-project, пример:
    # importas:
    #   alias:
    #     - pkg: gitlab.gid.team/x/y/pkg/api/order/v1
    #       alias: orderpb
    gocritic:
      disabled-checks:
        - importShadow
        - emptyStringTest
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    custom:
      # --- Слой 1: простые AST-паттерны (бывший ruleguard) ---
      gidtimenow:
        type: module
        description: 'GID-001: time.Now() must not be called directly; use gdhelper.StdTime.Now()'
        original-url: github.com/slipros/gid-data-golang-eval
      giduuidnil:
        type: module
        description: 'GID-002: compare a UUID via IsNil(), not uuid.UUID{}'
        original-url: github.com/slipros/gid-data-golang-eval
      giduuidversion:
        type: module
        description: 'GID-003: generate UUIDs via uuid.Must(uuid.NewV7()), not NewV1/3/4/5/6'
        original-url: github.com/slipros/gid-data-golang-eval
      gidnewderef:
        type: module
        description: 'GID-005: avoid the new() builtin; use &T{} or var x T'
        original-url: github.com/slipros/gid-data-golang-eval
      gidyoda:
        type: module
        description: 'GID-006: no yoda conditions; the literal goes on the right'
        original-url: github.com/slipros/gid-data-golang-eval
      gidquoteverb:
        type: module
        description: 'GID-007: use %q instead of hand-escaped quotes around %s/%v'
        original-url: github.com/slipros/gid-data-golang-eval
      giddeepequal:
        type: module
        description: 'GID-008: avoid reflect.DeepEqual; use require/cmp or explicit comparison'
        original-url: github.com/slipros/gid-data-golang-eval
      # --- Слой 2: собственные go/analysis правила ---
      gidnogetprefix:
        type: module
        description: 'GID-101: forbid the Get prefix in method names'
        original-url: github.com/slipros/gid-data-golang-eval
      gidnobatch:
        type: module
        description: 'GID-102: forbid the word Batch in method names'
        original-url: github.com/slipros/gid-data-golang-eval
      gidonlygofrsuuid:
        type: module
        description: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
        original-url: github.com/slipros/gid-data-golang-eval
      gidallptr:
        type: module
        description: 'GID-004: iterate a slice of structs via gdhelper.AllPtr'
        original-url: github.com/slipros/gid-data-golang-eval
      gidflatlayout:
        type: module
        description: 'GID-138: repositories and services live at their layer root'
        original-url: github.com/slipros/gid-data-golang-eval
      giddomainerrors:
        type: module
        description: 'GID-144: all domain errors live in /domain/model'
        original-url: github.com/slipros/gid-data-golang-eval
      giddalerrors:
        type: module
        description: 'GID-145: all dal errors live in /dal/entity'
        original-url: github.com/slipros/gid-data-golang-eval
      gidonlypkgerrors:
        type: module
        description: 'GID-146: errors are created only via github.com/pkg/errors'
        original-url: github.com/slipros/gid-data-golang-eval
      gidservicesingle:
        type: module
        description: 'GID-148: a service does not depend on another service'
        original-url: github.com/slipros/gid-data-golang-eval
      gidlayerimports:
        type: module
        description: 'GID-132/170/172/224…229: layer isolation matrix (dal/domain/server/schedule/validate/event/client/metric/app)'
        original-url: github.com/slipros/gid-data-golang-eval
        # Ослабление встроенной матрицы и свои правила:
        # settings:
        #   disable:           # GID-ID, которые проект осознанно отключает
        #     - GID-224        #   (например, на переходный период)
        #   rules:             # свои правила поверх матрицы
        #     - id: SVC-1
        #       scope: domain/service
        #       banned: [legacy]
        #       reason: 'пакет legacy выпиливается — новые зависимости запрещены'
      gidservicemodel:
        type: module
        description: 'GID-151: service API takes and returns model, not entity'
        original-url: github.com/slipros/gid-data-golang-eval
      gidparamorder:
        type: module
        description: 'GID-110/113/153: parameter order: ctx, opts, logger'
        original-url: github.com/slipros/gid-data-golang-eval
      gidoptsstyle:
        type: module
        description: 'GID-152: opts by pointer in params, embedded in the struct'
        original-url: github.com/slipros/gid-data-golang-eval
      gidlogconstruct:
        type: module
        description: 'GID-154: entity constructor with a logger calls WithField'
        original-url: github.com/slipros/gid-data-golang-eval
      gidlogctx:
        type: module
        description: 'GID-155: log with WithContext (when ctx) and WithError (Error level)'
        original-url: github.com/slipros/gid-data-golang-eval
      gidlogchain:
        type: module
        description: 'GID-156: logrus chain: one call per line'
        original-url: github.com/slipros/gid-data-golang-eval
      gidconstvarorder:
        type: module
        description: 'GID-130: declaration order: import, const, var, then the rest'
        original-url: github.com/slipros/gid-data-golang-eval
      gidconstscope:
        type: module
        description: 'GID-194: constants are declared where used, not globally'
        original-url: github.com/slipros/gid-data-golang-eval
        # Исключения (помимо //nolint:gidconstscope) — имена констант:
        # settings:
        #   exclude:
        #     - LegacyTimeout
      gidmodelmethod:
        type: module
        description: 'GID-195: a service/usecase function over one model value is a model method'
        original-url: github.com/slipros/gid-data-golang-eval
        # Исключения (помимо //nolint:gidmodelmethod):
        # settings:
        #   exclude:
        #     - 'legacyTitle'            # имя функции
        #     - 'Service.legacyRender'   # Тип.Метод
      gidchainperline:
        type: module
        description: 'GID-196: call chain: one call per line, including the first'
        original-url: github.com/slipros/gid-data-golang-eval
        # Порог длины цепочки (по умолчанию 2; logrus — зона gidlogchain):
        # settings:
        #   min-calls: 3
      gidifacemin:
        type: module
        description: 'GID-197: a dependency interface holds only the methods used'
        original-url: github.com/slipros/gid-data-golang-eval
        # Исключения (помимо //nolint:gidifacemin):
        # settings:
        #   exclude:
        #     - 'LegacyGateway'        # интерфейс целиком
        #     - 'AlertSink.Flush'      # Интерфейс.Метод
      gidinout:
        type: module
        description: 'GID-111: input model/entity by pointer, output by value'
        original-url: github.com/slipros/gid-data-golang-eval
        # Исключения (помимо //nolint:gidinout):
        # settings:
        #   exclude:
        #     - 'Snapshot.SnapshotPtr' # Тип.Метод
        #     - 'EncodeRaw'            # имя метода на любом типе
      gidcreateupdate:
        type: module
        description: 'GID-112: Create*/Update* in repo and service return only error'
        original-url: github.com/slipros/gid-data-golang-eval
        # Исключения (помимо //nolint:gidcreateupdate) — когда удобно
        # сразу получить созданную сущность:
        # settings:
        #   exclude:
        #     - 'Job.CreateJob'  # Тип.Метод
        #     - 'CreateSession'  # имя метода на любом типе
      gidprivatefunc:
        type: module
        description: 'GID-133: private functions in service/usecase/repository are struct methods'
        original-url: github.com/slipros/gid-data-golang-eval
      gidentitygroup:
        type: module
        description: 'GID-157: entity code is one block: type, constructor, methods'
        original-url: github.com/slipros/gid-data-golang-eval
      giddirtree:
        type: module
        description: 'GID-158: folder-tree control: only allowed subfolders'
        original-url: github.com/slipros/gid-data-golang-eval
        # Дерево этого репозитория (заменяет дефолтное дерево сервиса).
        # Формат: "папка" -> разрешённые подпапки; уровень — любой.
        settings:
          tree:
            internal:
              - exclude
              - lgr
              - pathseg
      gidcacheplace:
        type: module
        description: 'GID-159: caching lives in a repository decorator; domain knows nothing about cache'
        original-url: github.com/slipros/gid-data-golang-eval
        # Список кэш-библиотек можно заменить:
        # settings:
        #   packages:
        #     - github.com/redis/go-redis
        #     - example.com/inhouse/cache
      gidgrpcinservice:
        type: module
        description: 'GID-160: a service calls gRPC through a repository'
        original-url: github.com/slipros/gid-data-golang-eval
        # Исключения (иногда gRPC вызывается прямо в service):
        # settings:
        #   exclude:
        #     - gitlab.gid.team/x/y/pkg/api/orderpb
      gidnopanic:
        type: module
        description: 'GID-161: panic is used only in package main'
        original-url: github.com/slipros/gid-data-golang-eval
      gidhttperrors:
        type: module
        description: 'GID-162: an http handler handles its own errors'
        original-url: github.com/slipros/gid-data-golang-eval
      giddataresponse:
        type: module
        description: 'GID-163: an http handler uses data-response.go/v2'
        original-url: github.com/slipros/gid-data-golang-eval
        # Исключения (чистый handler позволителен, например health-чекам):
        # settings:
        #   exclude:
        #     - 'Health'           # имя функции
        #     - 'Probe.Readiness'  # Тип.Метод
      gidvalidator:
        type: module
        description: 'GID-164: incoming data is validated via validator.go/v2'
        original-url: github.com/slipros/gid-data-golang-eval
        # Исключения (validate-пакеты, освобождённые от требования):
        # settings:
        #   exclude:
        #     - kafka/consumer/validate  # суффикс пути пакета
      gidctxkeys:
        type: module
        description: 'GID-165/166/167: context keys in /domain/model; ContextWith<Name>/<Name>FromContext; type ContextKey string + snake_case'
        original-url: github.com/slipros/gid-data-golang-eval
      gidreceiver:
        type: module
        description: 'GID-103: receiver is the first letter of the type, two for slice types (v/h for validators/handlers)'
        original-url: github.com/slipros/gid-data-golang-eval
      gidctor:
        type: module
        description: 'GID-104: constructor New<Entity>, not bare New'
        original-url: github.com/slipros/gid-data-golang-eval
      gidconvnaming:
        type: module
        description: 'GID-105/135: converters <Dst><Type>From<Src> in convert/ packages'
        original-url: github.com/slipros/gid-data-golang-eval
      gidnoptr:
        type: module
        description: 'GID-120/121: forbid *uuid.UUID; in model no *time.Time or pointers to string'
        original-url: github.com/slipros/gid-data-golang-eval
      gidsqlnull:
        type: module
        description: 'GID-122: nullable entity fields use sql.Null*, not pointers'
        original-url: github.com/slipros/gid-data-golang-eval
      gidenumstring:
        type: module
        description: 'GID-124: an enum (string type with const) implements String()'
        original-url: github.com/slipros/gid-data-golang-eval
      giddbtags:
        type: module
        description: 'GID-125: entity struct fields have a mapping tag (db by default)'
        original-url: github.com/slipros/gid-data-golang-eval
        # Список допустимых тегов можно расширить — например, библиотека
        # для ClickHouse использует ch:
        # settings:
        #   tags:
        #     - db
        #     - ch
      gidenumbased:
        type: module
        description: 'GID-123: enum is a named string type, not alias/int/bare const'
        original-url: github.com/slipros/gid-data-golang-eval
      gidmodeltags:
        type: module
        description: 'GID-168: db tags are forbidden in the domain layer; db mapping lives in entity'
        original-url: github.com/slipros/gid-data-golang-eval
        # Список тегов маппинга — как у giddbtags:
        # settings:
        #   tags:
        #     - db
        #     - ch
      giderrfile:
        type: module
        description: 'GID-169: layer errors in /domain/model and /dal/entity live in error.go'
        original-url: github.com/slipros/gid-data-golang-eval
        # Допустимые имена файлов (по умолчанию error.go, errors.go и err.go):
        # settings:
        #   files:
        #     - error.go
      gidfilterplace:
        type: module
        description: 'GID-171: filters live in /dal/entity/filter and in the model layer'
        original-url: github.com/slipros/gid-data-golang-eval
      gidifacenaming:
        type: module
        description: 'GID-173: dependency interfaces have an entity prefix (HelloRepository)'
        original-url: github.com/slipros/gid-data-golang-eval
