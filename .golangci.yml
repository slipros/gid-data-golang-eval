        #   exclude:
        #     - 'debug'
      gidmodulealias:
        type: module
        description: 'GID-240: imports of shared internal entities from pkg/<module> carry a common-prefixed alias (commonservice)'
        original-url: github.com/slipros/gid-data-golang-eval
        # The alias prefix can be replaced:
