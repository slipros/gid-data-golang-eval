        #   exclude:
        #     - 'Legacy.Enrich'
      gidcliflags:
        type: module
        description: 'GID-238/239: cli flag Name is kebab-case, env vars are UPPER_SNAKE_CASE; a flag needs Required or a default Value'
        original-url: github.com/slipros/gid-data-golang-eval
        # Flags exempt from GID-239:
