        original-url: github.com/slipros/gid-data-golang-eval
        # Список банов настраивается; пусто → дефолт gdpostgres.TQuery:
        # settings:
        #   symbols:
        #     - pkg: gitlab.gid.team/gid-data/tech/golang/libs/postgres.git
        #       name: TQuery
        #       msg: 'используй прямые методы conn: Select, ScanRow, NamedStruct, Transaction'

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # --- база consent-api ---
      - linters:
          - govet
        text: declaration of "err" shadows declaration
      - linters:
          - err113
        text: do not define dynamic errors, use wrapped static errors instead
      - linters:
          - gocritic
        text: 'commentedOutCode: may want to remove commented-out code'
      - path: (.+)\.go$
        text: ST1000
      # --- специфика этого репозитория ---
      # ruleguard-функции вызывает движок gocritic, а не Go-код — для unused
      # они выглядят мёртвыми
      - path: ruleguard/rules\.go
        linters:
          - unused
      # AST-анализаторы сравнивают имена идентификаторов и арности сигнатур —
      # строковые и числовые литералы здесь законны
      - path: analyzers/
        linters:
          - goconst
          - mnd
    paths:
      - \.pb\.go$
      - \.pb\.gw\.go$
      - consumer/http/docs
      - mock*
      - third_party$
      - builtin$
      - examples$
      # eval-фикстуры намеренно нарушают правила (специфика этого репозитория)
      - testdata

formatters:
  enable:
    - goimports # GID-203
  exclusions:
    generated: lax
    paths:
      - \.pb\.go$
      - \.pb\.gw\.go$
      - consumer/http/docs
      - mock*
      - third_party$
      - builtin$
      - examples$
