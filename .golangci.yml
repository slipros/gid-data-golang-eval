# Reference config for custom-gcl. Rule registry — RULES.md.
# Base — the production consent-api config (UDMP/backend-go); on top of it sit
# the GID layers: simple patterns (layer 1) and custom gid analyzers (layer 2) —
# plus standard-linter settings tuned to the styleguide (layer 3).
version: "2"

run:
  issues-exit-code: 1
  # The base set tests: false; enabled here, otherwise test rules
  # (GID-191 gidsubtestname, GID-209) do not work.
  tests: true
  allow-parallel-runners: true
  concurrency: 4
  go: "1.25"
  modules-download-mode: readonly

issues:
  # 0 = unlimited: the same issue may occur many times in different places,
  # and an LLM agent needs the full list to fix everything (a capped output
  # hides the real amount of work — e.g. 210 giddirtree findings vs 3 shown).
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false                     # false = check all code, true = changes only
  # one line may violate several rules — show them all
  uniq-by-line: false

linters:
  # default: standard — errcheck, govet, ineffassign, staticcheck, unused
  # (GID-202/205/206)
  enable:
    # --- consent-api base ---
    - bidichk
    - bodyclose
    - contextcheck
    - copyloopvar
    - durationcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - forcetypeassert
    - goconst
    - gocritic
    - gosec
    - importas       # GID-208: fixed import aliases (pb etc.)
    - ireturn        # GID-208: accept interfaces, return concrete types
    - makezero
    - misspell
    - mnd
    - nakedret       # GID-208: naked return only in short functions
    - nestif         # GID-208: if nesting depth
    - nilerr
    - noctx
    - nolintlint
    - prealloc       # GID-208: capacity hint for slices
    - predeclared    # GID-208: do not shadow builtin names
    - promlinter
    - revive         # GID-207: selected rules only (see settings)
    - staticcheck    # GID-205/206: SA + S + QF + all ST (checks: all)
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    # --- layer 3, added on top of the base (GID-208, rationale — STYLEGUIDE_COVERAGE.md) ---
    - musttag        # GID-208: tags on marshaled structs
    - perfsprint     # GID-208: strconv vs fmt, concatenation vs Sprintf
    - depguard       # GID-137: library bans by import path (uuid forks, see settings)
    # --- Layer 1: simple AST patterns (former ruleguard) ---
    - gidtimenow       # GID-001
    - giduuidnil       # GID-002
    - giduuidversion   # GID-003
    - gidnewderef      # GID-005
    - gidyoda          # GID-006
    - gidquoteverb     # GID-007
    - giddeepequal     # GID-008
    # --- Layer 2: custom go/analysis rules ---
    - gidnogetprefix   # GID-101
    - gidnobatch       # GID-102
    - gidonlygofrsuuid # GID-137
    - gidallptr        # GID-004
    - gidflatlayout    # GID-138
    - giddomainerrors  # GID-144
    - giddalerrors     # GID-145
    - gidonlypkgerrors # GID-146
    - gidservicesingle # GID-148
    - gidlayerimports  # GID-132/170/172
    - gidservicemodel  # GID-151
    - gidparamorder    # GID-110/113/153
    - gidoptsstyle     # GID-152
    - gidlogconstruct  # GID-154
    - gidlogctx        # GID-155
    - gidlogchain      # GID-156
    - gidconstvarorder # GID-130
    - gidconstscope    # GID-194
    - gidmodelmethod   # GID-195
    - gidchainperline  # GID-196
    - gidifacemin      # GID-197
    - gidinout         # GID-111
    - gidcreateupdate  # GID-112
    - gidprivatefunc   # GID-133
    - gidentitygroup   # GID-157
    - giddirtree       # GID-158
    - gidcacheplace    # GID-159
    - gidgrpcinservice # GID-160
    - gidnopanic       # GID-161
    - gidhttperrors    # GID-162
    - giddataresponse  # GID-163
    - gidvalidator     # GID-164
    - gidctxkeys       # GID-165/166/167
    - gidreceiver      # GID-103
    - gidctor          # GID-104
    - gidconvnaming    # GID-105/135
    - gidnoptr         # GID-120/121
    - gidsqlnull       # GID-122
    - gidenumstring    # GID-124
    - giddbtags        # GID-125
    - gidenumbased     # GID-123
    - gidmodeltags     # GID-168
    - giderrfile       # GID-169
    - gidfilterplace   # GID-171
    - gidifacenaming   # GID-173
    - gidmetricstruct  # GID-174
    - gidintransaction # GID-175
    - giderrwrap       # GID-176
    - gidstaticerr     # GID-177
    - gidifaceplace    # GID-134
    - gidembedmutex    # GID-178
    - gidchanbuf       # GID-179
    - gidinitclean     # GID-180
    - gidexitonce      # GID-181
    - gidbytesinloop   # GID-182
    - gidmapcap        # GID-183
    - gidfailedto      # GID-184
    - gidnilslice      # GID-185
    - gidfmtconst      # GID-186
    - gidutilpkg       # GID-187
    - gidcustomctx     # GID-188
    - gidchandir       # GID-189
    - giderrlast       # GID-190
    - gidsubtestname   # GID-191
    - gidflagmain      # GID-192
    - gidpkgstutter    # GID-193
    - gidentitymethod  # GID-114
    - gidoptsnaming    # GID-126
    - gidupwardimport  # GID-131
    - giderrnew        # GID-136
    - gidenumconvert   # GID-143
    - gidopstruct      # GID-210
    - gidenumplace     # GID-211
    - gidbuildsig      # GID-212
    - gidvalidatorshape # GID-213
    - gidloggernew     # GID-214
    - gidinlineconv    # GID-215
    - gideventctor     # GID-216
    - gidbansymbol     # GID-217
    - gidhandlershape  # GID-230
    - gidfsmmap        # GID-231
    - gidprotorequired # GID-232
    - gidenumcast      # GID-233
    - gidconvpure      # GID-235
    - gidserviceentity # GID-236
    - gidwithmessage   # GID-237
    - gidcliflags      # GID-238/239
    - gidmodulealias   # GID-240
    - giderrname       # GID-234
    - giderrmapfunc    # GID-242
    - giderrzeroret    # GID-243
    - gidsentinelwrap  # GID-244
    - gidscanrow       # GID-245
  disable:
    # The disabled list comes from the consent-api base (a deliberate team choice).
    # Some of them would cover GID rules — marked with a comment.
    - asasalint
    - asciicheck
    - containedctx    # GID-208: context is not stored in a struct
    - cyclop
    - decorder
    - dogsled
    - exhaustive
    - exhaustruct
    - forbidigo
    - funlen
    - gochecknoglobals
    - gochecknoinits  # GID-208: init() is forbidden
    - gocognit        # GID-208: cognitive complexity
    - gocyclo
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - grouper         # GID-208: declaration grouping
    - interfacebloat  # GID-208: small interfaces
    - lll             # GID-201: line width <= 120
    - maintidx
    - nilnil
    - nlreturn
    - nonamedreturns
    - nosprintfhostport
    - paralleltest    # GID-209
    - reassign
    - rowserrcheck
    - sqlclosecheck
    - tagliatelle
    - testpackage     # GID-209: external _test packages
    - thelper         # GID-209: t.Helper() in test helpers
    - tparallel       # GID-209: t.Parallel correctness
    - varnamelen
    - wrapcheck
    - wsl

  settings:
    dupl:
      threshold: 100
    errcheck:
      exclude-functions:
        - io/ioutil.ReadFile
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)
        - (io.ReadCloser).Close
        - (*net/http.Response).Body.Close
      check-type-assertions: true # GID-202: comma-ok is mandatory
      check-blank: true           # GID-202: _ = err is forbidden
    goconst:
      min-len: 2
      min-occurrences: 2
    # depguard — only module-independent library bans (full import path).
    # Cross-layer bans cannot be expressed here: deny is prefix matching and
    # would require hardcoding the module path in every service. Layer
    # direction is covered by gidlayerimports (GID-132/170/172/224…229).
    depguard:
      rules:
        uuid:
          files: ["$all"]
          deny:
            - pkg: github.com/google/uuid
              desc: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
            - pkg: github.com/satori/go.uuid
              desc: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
            - pkg: github.com/pborman/uuid
              desc: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
            - pkg: github.com/hashicorp/go-uuid
              desc: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
            - pkg: github.com/twinj/uuid
              desc: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
    staticcheck:
      # GID-206: also enable stylistic ST checks disabled by default
      # (ST1003 initialisms, ST1016 receiver). ST1000 is silenced in exclusions.
      checks: ["all"]
    revive:
      # GID-207: selected rules only (see STYLEGUIDE_COVERAGE.md)
      rules:
        - name: package-comments  # from the consent-api base
          severity: warning
          disabled: true
        - name: exported          # doc comments on exported symbols
        - name: indent-error-flow # the error is handled in if, without else
        - name: early-return
        - name: superfluous-else
        - name: deep-exit         # os.Exit/log.Fatal outside main are forbidden
        - name: dot-imports
        - name: blank-imports     # blank import requires a comment
        - name: use-any           # any instead of interface{}
    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - generic
    # importas: aliases are pinned per project, example:
    # importas:
    #   alias:
    #     - pkg: gitlab.gid.team/x/y/pkg/api/order/v1
    #       alias: orderpb
    gocritic:
      disabled-checks:
        - importShadow
        - emptyStringTest
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    custom:
      # --- Layer 1: simple AST patterns (former ruleguard) ---
      gidtimenow:
        type: module
        description: 'GID-001: time.Now() must not be called directly; use gdhelper.StdTime.Now()'
        original-url: github.com/slipros/gid-data-golang-eval
      giduuidnil:
        type: module
        description: 'GID-002: compare a UUID via IsNil(), not uuid.UUID{}'
        original-url: github.com/slipros/gid-data-golang-eval
      giduuidversion:
        type: module
        description: 'GID-003: generate UUIDs via uuid.Must(uuid.NewV7()), not NewV1/3/4/5/6'
        original-url: github.com/slipros/gid-data-golang-eval
      gidnewderef:
        type: module
        description: 'GID-005: avoid the new() builtin; use &T{} or var x T'
        original-url: github.com/slipros/gid-data-golang-eval
      gidyoda:
        type: module
        description: 'GID-006: no yoda conditions; the literal goes on the right'
        original-url: github.com/slipros/gid-data-golang-eval
      gidquoteverb:
        type: module
        description: 'GID-007: use %q instead of hand-escaped quotes around %s/%v'
        original-url: github.com/slipros/gid-data-golang-eval
      giddeepequal:
        type: module
        description: 'GID-008: avoid reflect.DeepEqual; use require/cmp or explicit comparison'
        original-url: github.com/slipros/gid-data-golang-eval
      # --- Layer 2: custom go/analysis rules ---
      gidnogetprefix:
        type: module
        description: 'GID-101: forbid the Get prefix in method names'
        original-url: github.com/slipros/gid-data-golang-eval
      gidnobatch:
        type: module
        description: 'GID-102: forbid the word Batch in method names'
        original-url: github.com/slipros/gid-data-golang-eval
      gidonlygofrsuuid:
        type: module
        description: 'GID-137: for UUID only github.com/gofrs/uuid is allowed'
        original-url: github.com/slipros/gid-data-golang-eval
      gidallptr:
        type: module
        description: 'GID-004: iterate a slice of structs via gdhelper.AllPtr'
        original-url: github.com/slipros/gid-data-golang-eval
      gidflatlayout:
        type: module
        description: 'GID-138: repositories and services live at their layer root'
        original-url: github.com/slipros/gid-data-golang-eval
      giddomainerrors:
        type: module
        description: 'GID-144: all domain errors live in /domain/model'
        original-url: github.com/slipros/gid-data-golang-eval
      giddalerrors:
        type: module
        description: 'GID-145: all dal errors live in /dal/entity'
        original-url: github.com/slipros/gid-data-golang-eval
      gidonlypkgerrors:
        type: module
        description: 'GID-146: errors are created only via github.com/pkg/errors'
        original-url: github.com/slipros/gid-data-golang-eval
      gidservicesingle:
        type: module
        description: 'GID-148: a service does not depend on another service'
        original-url: github.com/slipros/gid-data-golang-eval
      gidlayerimports:
        type: module
        description: 'GID-132/170/172/224…229/241: layer isolation matrix (dal/domain/server/schedule/validate/event/job/client/metric/app); repository imports are allow-listed to app and the repository layer'
        original-url: github.com/slipros/gid-data-golang-eval
        # Relaxing the built-in matrix and adding custom rules:
        # settings:
        #   disable:           # GID-IDs the project deliberately turns off
        #     - GID-224        #   (e.g. for a transition period)
        #   rules:             # custom rules on top of the matrix
        #     - id: SVC-1
        #       scope: domain/service
        #       banned: [legacy]
        #       reason: 'the legacy package is being removed — new dependencies are forbidden'
      gidservicemodel:
        type: module
        description: 'GID-151: service API takes and returns model, not entity'
        original-url: github.com/slipros/gid-data-golang-eval
      gidparamorder:
        type: module
        description: 'GID-110/113/153: parameter order: ctx, opts, logger'
        original-url: github.com/slipros/gid-data-golang-eval
      gidoptsstyle:
        type: module
        description: 'GID-152: opts by pointer in params; stored as a named unexported field (embedding is forbidden)'
        original-url: github.com/slipros/gid-data-golang-eval
      gidlogconstruct:
        type: module
        description: 'GID-154: entity constructor with a logger calls WithField'
        original-url: github.com/slipros/gid-data-golang-eval
      gidlogctx:
        type: module
        description: 'GID-155: log with WithContext (when ctx) and WithError (Error level)'
        original-url: github.com/slipros/gid-data-golang-eval
      gidlogchain:
        type: module
        description: 'GID-156: logrus chain: one call per line'
        original-url: github.com/slipros/gid-data-golang-eval
      gidconstvarorder:
        type: module
        description: 'GID-130: declaration order: import, const, var, then the rest'
        original-url: github.com/slipros/gid-data-golang-eval
      gidconstscope:
        type: module
        description: 'GID-194: constants are declared where used, not globally'
        original-url: github.com/slipros/gid-data-golang-eval
        # Exclusions (besides //nolint:gidconstscope) — constant names:
        # settings:
        #   exclude:
        #     - LegacyTimeout
      gidmodelmethod:
        type: module
        description: 'GID-195: a service/usecase function over one model value is a model method'
        original-url: github.com/slipros/gid-data-golang-eval
        # Exclusions (besides //nolint:gidmodelmethod):
        # settings:
        #   exclude:
        #     - 'legacyTitle'            # function name
        #     - 'Service.legacyRender'   # Type.Method
      gidchainperline:
        type: module
        description: 'GID-196: call chain: one call per line, including the first'
        original-url: github.com/slipros/gid-data-golang-eval
        # Chain length threshold (default 2; logrus is gidlogchain territory):
        # settings:
        #   min-calls: 3
      gidifacemin:
        type: module
        description: 'GID-197: a dependency interface holds only the methods used'
        original-url: github.com/slipros/gid-data-golang-eval
        # Exclusions (besides //nolint:gidifacemin):
        # settings:
        #   exclude:
        #     - 'LegacyGateway'        # the whole interface
        #     - 'AlertSink.Flush'      # Interface.Method
      gidinout:
        type: module
        description: 'GID-111: input model/entity by pointer, output by value'
        original-url: github.com/slipros/gid-data-golang-eval
        # Exclusions (besides //nolint:gidinout):
        # settings:
        #   exclude:
        #     - 'Snapshot.SnapshotPtr' # Type.Method
        #     - 'EncodeRaw'            # method name on any type
      gidcreateupdate:
        type: module
        description: 'GID-112: Create*/Update* in repo and service return only error'
        original-url: github.com/slipros/gid-data-golang-eval
        # Exclusions (besides //nolint:gidcreateupdate) — when it is handy
        # to get the created entity right away:
        # settings:
        #   exclude:
        #     - 'Job.CreateJob'  # Type.Method
        #     - 'CreateSession'  # method name on any type
      gidprivatefunc:
        type: module
        description: 'GID-133: private functions in service/usecase/repository are struct methods'
        original-url: github.com/slipros/gid-data-golang-eval
      gidentitygroup:
        type: module
        description: 'GID-157: entity code is one block: type, constructor, methods'
        original-url: github.com/slipros/gid-data-golang-eval
      giddirtree:
        type: module
        description: 'GID-158: folder-tree control: only allowed subfolders (default: the canonical internal/ tree incl. job and schedule)'
        original-url: github.com/slipros/gid-data-golang-eval
        # Tree of this repository (replaces the default service tree).
        # Format: "folder" -> allowed subfolders; any nesting level.
        settings:
          tree:
            internal:
              - exclude
              - lgr
              - pathseg
      gidcacheplace:
        type: module
        description: 'GID-159: caching lives in a repository decorator; domain knows nothing about cache'
        original-url: github.com/slipros/gid-data-golang-eval
        # The list of cache libraries can be replaced:
        # settings:
        #   packages:
        #     - github.com/redis/go-redis
        #     - example.com/inhouse/cache
      gidgrpcinservice:
        type: module
        description: 'GID-160: a service calls gRPC through a repository'
        original-url: github.com/slipros/gid-data-golang-eval
        # Exclusions (sometimes gRPC is called directly in service):
        # settings:
        #   exclude:
        #     - gitlab.gid.team/x/y/pkg/api/orderpb
      gidnopanic:
        type: module
        description: 'GID-161: panic is used only in package main'
        original-url: github.com/slipros/gid-data-golang-eval
      gidhttperrors:
        type: module
        description: 'GID-162: an http handler handles its own errors'
        original-url: github.com/slipros/gid-data-golang-eval
      giddataresponse:
        type: module
        description: 'GID-163: an http handler uses data-response.go/v2'
        original-url: github.com/slipros/gid-data-golang-eval
        # Exclusions (a plain handler is acceptable, e.g. for health checks):
        # settings:
        #   exclude:
        #     - 'Health'           # function name
        #     - 'Probe.Readiness'  # Type.Method
      gidvalidator:
        type: module
        description: 'GID-164: incoming data is validated via validator.go/v2'
        original-url: github.com/slipros/gid-data-golang-eval
        # Exclusions (validate packages exempt from the requirement):
        # settings:
        #   exclude:
        #     - kafka/consumer/validate  # package path suffix
      gidctxkeys:
        type: module
        description: 'GID-165/166/167: context keys in /domain/model; ContextWith<Name>/<Name>FromContext; type ContextKey string + snake_case'
        original-url: github.com/slipros/gid-data-golang-eval
      gidreceiver:
        type: module
        description: 'GID-103: receiver is the lowercase first letter of the type, two for slice types; no exceptions'
        original-url: github.com/slipros/gid-data-golang-eval
      gidctor:
        type: module
        description: 'GID-104: constructor New<Entity>, not bare New'
        original-url: github.com/slipros/gid-data-golang-eval
      gidconvnaming:
        type: module
        description: 'GID-105/135: converters <Dst><Type>From<Src> in convert/ packages'
        original-url: github.com/slipros/gid-data-golang-eval
      gidnoptr:
        type: module
        description: 'GID-120/121: forbid *uuid.UUID; in model and event/dto no pointers to simple types (except *bool)'
        original-url: github.com/slipros/gid-data-golang-eval
      gidsqlnull:
        type: module
        description: 'GID-122: nullable entity fields use sql.Null*, not pointers'
        original-url: github.com/slipros/gid-data-golang-eval
      gidenumstring:
        type: module
        description: 'GID-124: an enum (string type with const) implements String()'
        original-url: github.com/slipros/gid-data-golang-eval
      giddbtags:
        type: module
        description: 'GID-125: entity struct fields have a mapping tag (db by default)'
        original-url: github.com/slipros/gid-data-golang-eval
        # The list of allowed tags can be extended — e.g. the ClickHouse
        # library uses ch:
        # settings:
        #   tags:
        #     - db
        #     - ch
      gidenumbased:
        type: module
        description: 'GID-123: enum is a named string type, not alias/int/bare const (model/entity/event-dto)'
        original-url: github.com/slipros/gid-data-golang-eval
      gidmodeltags:
        type: module
        description: 'GID-168: db tags are forbidden in the domain layer; db mapping lives in entity'
        original-url: github.com/slipros/gid-data-golang-eval
        # The list of mapping tags — same as giddbtags:
        # settings:
        #   tags:
        #     - db
        #     - ch
      giderrfile:
        type: module
        description: 'GID-169: layer errors in /domain/model and /dal/entity live in error.go'
        original-url: github.com/slipros/gid-data-golang-eval
        # Allowed file names (default: error.go — the canonical name):
        # settings:
        #   files:
        #     - error.go
      gidfilterplace:
        type: module
        description: 'GID-171: filters live in /dal/entity/filter and in the model layer'
        original-url: github.com/slipros/gid-data-golang-eval
      gidifacenaming:
        type: module
        description: 'GID-173: dependency interfaces have an entity prefix (HelloRepository)'
        original-url: github.com/slipros/gid-data-golang-eval
        # The dictionary of bare role names can be replaced:
        # settings:
        #   names:
        #     - Repository
        #     - Service
      gidmetricstruct:
        type: module
        description: 'GID-174: metric package is a Prometheus aggregator (wiring in prometheus.go) with Register'
        original-url: github.com/slipros/gid-data-golang-eval
      gidintransaction:
        type: module
        description: 'GID-175: transaction types (InTransactionFunc) live in /domain/model'
        original-url: github.com/slipros/gid-data-golang-eval
      giderrwrap:
        type: module
        description: 'GID-176: an error from an external call (another module; interface deps in client/repository/event) is wrapped with errors.Wrap in any layer; same-module errors in domain are not re-wrapped'
        original-url: github.com/slipros/gid-data-golang-eval
        # Exclusions ("Method" | "Type.Method"):
        # settings:
        #   exclude:
        #     - 'PassThrough'
      gidstaticerr:
        type: module
        description: 'GID-177: static errors on return use errors.WithStack (or Wrap)'
        original-url: github.com/slipros/gid-data-golang-eval
        # Constructors that already capture the stack:
        # settings:
        #   exclude:
        #     - 'gderror.NewUnhandledValueError'
      gidifaceplace:
        type: module
        description: 'GID-134: interfaces live at the consumer; exceptions: libraries and /domain/model for service/usecase'
