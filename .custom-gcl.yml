# Build of the custom-gcl binary with our rules:
#   golangci-lint custom
# The golangci-lint version is pinned — versions of shared libraries in go.mod
# (especially golang.org/x/tools) must match it.
version: v2.9.0
name: custom-gcl
destination: ./bin

plugins:
  # Local path — for development. After publishing a tag replace with:
  #   version: vX.Y.Z
  - module: 'github.com/slipros/gid-data-golang-eval'
    path: .
